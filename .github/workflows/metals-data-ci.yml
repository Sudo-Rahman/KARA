name: Metals data CI

on:
  push:
    paths:
      - "api/**"
      - "website/**"
      - ".github/workflows/metals-data-ci.yml"
      - ".github/workflows/metals-data-publish.yml"
  pull_request:
    paths:
      - "api/**"
      - "website/**"
      - ".github/workflows/metals-data-ci.yml"
      - ".github/workflows/metals-data-publish.yml"

permissions:
  contents: read

concurrency:
  group: metals-data-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check data generator (Node.js 24)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run checks
        run: npm run check

      - name: Set up Go for actionlint
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Validate GitHub Actions workflows
        working-directory: .
        run: >-
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          .github/workflows/metals-data-ci.yml
          .github/workflows/metals-data-publish.yml

  website:
    name: Check SvelteKit API cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website
    env:
      PUBLIC_SITE_URL: https://kara.example
      PUBLIC_APP_STORE_URL: https://apps.apple.com/app/kara/id000000000
      PUBLIC_GOOGLE_PLAY_URL: https://play.google.com/store/apps/details?id=app.kara
      PUBLIC_SUPPORT_EMAIL: support@kara.example
      PUBLIC_LEGAL_NAME: Kara

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check

      - name: Run unit tests
        run: pnpm test:unit --run

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test public metals endpoints
        run: pnpm exec playwright test tests/metals-api.spec.ts --project=desktop-chromium

      - name: Build SvelteKit server
        run: pnpm build
