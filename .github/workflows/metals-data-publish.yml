name: Update monthly metals data

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kara-metals-data-update
  cancel-in-progress: false

jobs:
  update:
    name: Generate and commit verified JSON files
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: website/data-pipeline
    env:
      OUTPUT_DIR: ../data
      SOURCE_ARCHIVE_DIR: artifacts/sources
      CURRENT_MANIFEST_URL: https://raw.githubusercontent.com/Sudo-Rahman/KARA/main/website/data/v1/manifest.json

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: website/data-pipeline/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run generator checks
        run: npm run check

      - name: Create publication timestamp
        id: timestamp
        shell: bash
        run: echo "published_at=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"

      - name: Generate publication
        id: generate
        env:
          PUBLISHED_AT: ${{ steps.timestamp.outputs.published_at }}
        run: npm run update

      - name: Upload generated JSON files
        if: ${{ steps.generate.outputs.generated == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: website/data/v1
          if-no-files-found: error
          retention-days: 90

      - name: Upload downloaded sources
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sources-${{ github.run_id }}-${{ github.run_attempt }}
          path: website/data-pipeline/artifacts/sources
          if-no-files-found: ignore
          retention-days: 90

      - name: Report unchanged publication
        if: ${{ steps.generate.outputs.status == 'unchanged' }}
        run: echo "The monthly data is unchanged; nothing will be committed."

      - name: Report source grace period
        if: ${{ steps.generate.outputs.status == 'waiting' }}
        run: echo "The newest expected month is not available yet; nothing will be committed."

      - name: Commit changed publication
        if: ${{ steps.generate.outputs.changed == 'true' }}
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          git add -- website/data/v1/manifest.json website/data/v1/metals-monthly.json
          if git diff --cached --quiet; then
            echo "Generator reported changed data but produced no committable diff." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: update monthly metals snapshot"
          git push origin "HEAD:${GITHUB_REF_NAME}"
